<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>结算单未提交发票看板</title>
<style>
  :root {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --border: #e8eaed;
    --text: #1f2937;
    --text-secondary: #6b7280;
    --primary: #2563eb;
    --primary-light: #eff6ff;
    --red: #dc2626;
    --red-bg: #fef2f2;
    --orange: #ea580c;
    --orange-bg: #fff7ed;
    --blue: #2563eb;
    --blue-bg: #eff6ff;
    --green: #16a34a;
    --green-bg: #f0fdf4;
    --radius: 10px;
    --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.03);
    --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.04), 0 1px 2px -1px rgb(0 0 0 / 0.04);
    --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.04);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 40%, #1a56db 100%);
    padding: 32px 48px 24px;
    position: relative;
    overflow: hidden;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .header::after {
    content: '';
    position: absolute;
    top: -80px; right: -40px;
    width: 280px; height: 280px;
    border-radius: 50%;
    background: rgba(255,255,255,0.025);
  }
  .header::before {
    content: '';
    position: absolute;
    bottom: -50px; left: 20%;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(255,255,255,0.015);
  }
  .header-inner {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
  .header-left { flex: 1; }
  .header-title-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 8px;
  }
  .header-icon {
    width: 44px; height: 44px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .header-icon svg { width: 22px; height: 22px; }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.5px;
  }
  .header .subtitle {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    font-weight: 400;
    margin-left: 4px;
  }
  .header .meta {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
  }
  .header .meta-item {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.04);
    padding: 3px 10px;
    border-radius: 20px;
  }
  .header .meta-item .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    flex-shrink: 0;
  }

  /* ── Container ── */
  .container {
    max-width: 1440px;
    margin: 0 auto;
    padding: 24px 32px 32px;
  }

  /* ── Section Title ── */
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: #64748b;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #e2e8f0;
  }

  /* ── Stat Cards ── */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border-radius: 10px;
    padding: 20px 22px;
    box-shadow: var(--shadow-sm);
    border: 1px solid #f1f5f9;
    position: relative;
    overflow: hidden;
    transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
  }
  .stat-card:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
    border-color: #e2e8f0;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .stat-card.red::before { background: var(--red); }
  .stat-card.orange::before { background: var(--orange); }
  .stat-card.blue::before { background: var(--blue); }
  .stat-card.green::before { background: var(--green); }
  .stat-card .card-icon {
    width: 34px; height: 34px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 10px;
  }
  .stat-card.red .card-icon { background: var(--red-bg); color: var(--red); }
  .stat-card.orange .card-icon { background: var(--orange-bg); color: var(--orange); }
  .stat-card.blue .card-icon { background: var(--blue-bg); color: var(--blue); }
  .stat-card.green .card-icon { background: var(--green-bg); color: var(--green); }
  .stat-card .card-label {
    font-size: 11px;
    color: #94a3b8;
    font-weight: 600;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .stat-card .card-value {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1.2;
  }
  .stat-card .card-sub {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 4px;
  }

  /* ── Chart + Breakdown Row ── */
  .analysis-row {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }
  .panel {
    background: var(--surface);
    border-radius: 10px;
    box-shadow: var(--shadow-sm);
    border: 1px solid #f1f5f9;
    padding: 22px 24px;
  }
  .panel-title {
    font-size: 13px;
    font-weight: 600;
    color: #475569;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.3px;
  }
  .panel-title::before {
    content: '';
    width: 3px; height: 16px;
    border-radius: 2px;
    background: var(--primary);
  }
  .donut-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .donut-wrap svg { width: 220px; height: 220px; }
  .donut-center-text {
    text-align: center;
    margin-top: -12px;
  }
  .donut-center-text .num {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .donut-center-text .unit {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 2px;
  }
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    margin-top: 14px;
    justify-content: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-secondary);
  }
  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* Breakdown Table */
  .breakdown-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .breakdown-table th {
    text-align: left;
    padding: 8px 0;
    font-weight: 500;
    color: var(--text-secondary);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    border-bottom: 1px solid var(--border);
  }
  .breakdown-table th:last-child,
  .breakdown-table td:last-child { text-align: right; }
  .breakdown-table td {
    padding: 7px 0;
    border-bottom: 1px solid #f3f4f6;
    color: var(--text);
  }
  .breakdown-table .amt { font-weight: 500; text-align: right; }
  .breakdown-table .pct-bar {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .breakdown-table .bar-track {
    flex: 1;
    height: 5px;
    background: #f3f4f6;
    border-radius: 3px;
    overflow: hidden;
  }
  .breakdown-table .bar-fill {
    height: 100%;
    border-radius: 3px;
  }

  /* ── Filter Bar ── */
  .filter-panel {
    background: var(--surface);
    border-radius: 10px;
    box-shadow: var(--shadow-sm);
    border: 1px solid #f1f5f9;
    padding: 16px 22px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .filter-panel .filter-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .filter-panel label {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 500;
    white-space: nowrap;
    letter-spacing: 0.2px;
  }
  .filter-panel input,
  .filter-panel select {
    height: 34px;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0 10px;
    font-size: 13px;
    color: var(--text);
    background: #fafbfc;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    font-family: inherit;
  }
  .filter-panel input { width: 140px; }
  .filter-panel select { width: auto; min-width: 100px; }
  .filter-panel input:focus,
  .filter-panel select:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.08);
    background: #fff;
  }
  .filter-panel input[type="date"] { width: 130px; }
  .filter-sep {
    color: var(--text-secondary);
    font-size: 12px;
  }
  .btn {
    height: 34px;
    padding: 0 18px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--primary);
    color: #fff;
  }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-ghost {
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: #f9fafb; color: var(--text); }
  .btn-export {
    background: var(--green);
    color: #fff;
    margin-left: auto;
  }
  .btn-export:hover { background: #15803d; }
  .filter-summary {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 500;
    margin-left: 8px;
  }

  /* ── Table ── */
  .table-panel {
    background: var(--surface);
    border-radius: 10px;
    box-shadow: var(--shadow-sm);
    border: 1px solid #f1f5f9;
    overflow: hidden;
  }
  .table-scroll {
    overflow-x: auto;
    max-height: 580px;
    overflow-y: auto;
  }
  table.data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 1200px;
  }
  table.data-table thead {
    position: sticky;
    top: 0;
    z-index: 3;
  }
  table.data-table th {
    background: #f1f5f9;
    text-align: left;
    padding: 10px 14px;
    font-weight: 600;
    font-size: 11px;
    color: #475569;
    letter-spacing: 0.4px;
    border-bottom: 2px solid #e2e8f0;
    white-space: nowrap;
  }
  table.data-table td {
    padding: 9px 14px;
    border-bottom: 1px solid #f8fafc;
    color: var(--text);
    white-space: nowrap;
    font-size: 13px;
  }
  table.data-table tbody tr { transition: background 0.12s; }
  table.data-table tbody tr:nth-child(even) { background: #fafbfc; }
  table.data-table tbody tr:hover { background: #eff6ff; }
  table.data-table .col-amt {
    text-align: right;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  table.data-table .col-invoice-empty {
    color: var(--red);
    font-weight: 500;
  }
  table.data-table .col-remark {
    font-size: 12px;
    color: var(--text-secondary);
    max-width: 160px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  table.data-table .col-settle-no {
    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    font-size: 12px;
    color: var(--primary);
    font-weight: 500;
  }

  /* Tags */
  .tag {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1px;
    white-space: nowrap;
  }
  .tag-red { background: var(--red-bg); color: var(--red); }
  .tag-orange { background: var(--orange-bg); color: var(--orange); }
  .tag-blue { background: var(--blue-bg); color: var(--blue); }
  .tag-amber { background: #fffbeb; color: #d97706; }
  .tag-purple { background: #f5f3ff; color: #7c3aed; }

  .no-data {
    text-align: center;
    padding: 80px 20px;
    color: #9ca3af;
  }
  .no-data svg { margin-bottom: 12px; opacity: 0.3; }

  /* ── Footer ── */
  .footer {
    text-align: center;
    padding: 20px;
    font-size: 11px;
    color: #9ca3af;
  }

  /* ── Responsive ── */
  @media (max-width: 1400px) {
    .stat-grid { grid-template-columns: repeat(4, 1fr); }
  }
  @media (max-width: 1200px) {
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
    .analysis-row { grid-template-columns: 1fr; }
  }
  @media (max-width: 768px) {
    .header { padding: 20px 24px; }
    .header h1 { font-size: 18px; }
    .container { padding: 16px; }
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
    .filter-panel { flex-direction: column; align-items: stretch; }
    .filter-panel input, .filter-panel select { width: 100%; }
    .btn-export { margin-left: 0; }
  }
</style>
</head>
<body>

<!-- ════════ HEADER ════════ -->
<header class="header">
  <div class="header-inner">
    <div class="header-left">
      <div class="header-title-row">
        <div class="header-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 12l2 2 4-4"/></svg>
        </div>
        <div>
          <h1>结算单未提交发票看板<span class="subtitle">Invoice Tracking</span></h1>
        </div>
      </div>
      <div class="meta">
        <span class="meta-item"><span class="dot"></span>2026-01-01 — 2026-07-15</span>
        <span class="meta-item"><span class="dot"></span>数据导出 2026-07-15</span>
              </div>
    </div>
  </div>
</header>

<div class="container">

  <!-- ════════ STAT CARDS ════════ -->
  <div class="stat-grid" id="statGrid">
    <div class="stat-card red">
      <div class="card-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 12l2 2 4-4"/></svg></div>
      <div class="card-label">缺发票结算单</div>
      <div class="card-value" style="color:#1f2937" id="cardTotal">0</div>
      <div class="card-sub">笔</div>
    </div>
    <div class="stat-card orange">
      <div class="card-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
      <div class="card-label">涉及金额</div>
      <div class="card-value" style="color:#1f2937" id="cardAmount">¥0.0万</div>
      <div class="card-sub">¥0</div>
    </div>
    <div class="stat-card red">
      <div class="card-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div>
      <div class="card-label">标准结算</div>
      <div class="card-value" style="color:var(--red)" id="cardStd">0</div>
      <div class="card-sub">¥0</div>
    </div>
    <div class="stat-card blue">
      <div class="card-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
      <div class="card-label">预付结算</div>
      <div class="card-value" style="color:var(--blue)" id="cardPre">0</div>
      <div class="card-sub">¥0</div>
    </div>
  </div>

  <!-- ════════ CHART + BREAKDOWN ════════ -->
  <div class="analysis-row">
    <div class="panel" id="chartPanel">
      <div class="panel-title">分类占比</div>
      <div class="donut-wrap">
        <svg viewBox="0 0 220 220" id="donutSvg">
          <circle cx="110" cy="110" r="80" fill="none" stroke="#f1f5f9" stroke-width="24"/>
          
          <circle cx="110" cy="110" r="68" fill="white"/>
        </svg>
        <div class="donut-center-text" id="donutCenter">
          <div class="num">0</div>
          <div class="unit">总笔数</div>
        </div>
        <div class="legend" id="donutLegend">
          
        </div>
      </div>
    </div>

    <div class="panel" id="breakdownPanel">
      <div class="panel-title">供应商分布 Top 10</div>
      <table class="breakdown-table">
        <thead><tr><th>供应商</th><th>笔数</th><th style="text-align:right">金额</th><th style="width:120px">占比</th></tr></thead>
        <tbody id="supplierBody">
          
        </tbody>
      </table>
    </div>
  </div>

  <!-- ════════ FILTER BAR ════════ -->
  <div class="section-title" style="margin-top:4px">数据明细 · 筛选</div>
  <div class="filter-panel" id="filterBar">
    <div class="filter-group">
      <label>结算单号</label>
      <input type="text" id="fSettleNo" placeholder="输入…">
    </div>
    <div class="filter-group">
      <label>订单编号</label>
      <input type="text" id="fOrderNo" placeholder="输入…">
    </div>
    <div class="filter-group">
      <label>供应商</label>
      <input type="text" id="fSupplier" placeholder="输入…">
    </div>
    <div class="filter-group">
      <label>主体</label>
      <select id="fCompany"><option value="">全部</option></select>
    </div>
    <div class="filter-group">
      <label>类型</label>
      <select id="fCategory"><option value="">全部</option><option value="标准">标准</option><option value="预付">预付</option></select>
    </div>
    <div class="filter-group">
      <label>时间筛选</label>
      <select id="fDateField" onchange="onDateFieldChange()">
        <option value="settleCreateTime" selected>结算创建时间</option>
        <option value="createTime">订单创建时间</option>
      </select>
      <input type="date" id="fDateStart" placeholder="起始">
      <span class="filter-sep">~</span>
      <input type="date" id="fDateEnd" placeholder="截止">
    </div>
    <button class="btn btn-primary" onclick="applyFilter()">应用筛选</button>
    <button class="btn btn-ghost" onclick="resetFilter()">清除筛选</button>
    <button class="btn btn-export" onclick="exportCSV()">导出 CSV</button>
    <span class="filter-summary" id="filterSummary">共 0 条</span>
  </div>

  <!-- ════════ DATA TABLE ════════ -->
  <div class="table-panel">
    <div class="table-scroll">
      <table class="data-table">
        <thead>
          <tr>
            <th style="width:70px">类型</th>
            <th style="width:150px">结算单号</th>
            <th style="width:150px">订单编号</th>
            <th style="width:110px">订单状态</th>
            <th style="width:110px;text-align:right">结算金额</th>
            <th style="width:160px">供应商</th>
            <th style="width:180px">公司主体</th>
            <th style="width:100px">订单创建</th>
            <th style="width:100px">结算创建</th>
            <th style="width:70px">采购员</th>
            <th style="width:100px">备注</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="no-data" id="noData" style="display:none">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <div>暂无匹配数据，请调整筛选条件</div>
    </div>
  </div>

  <div class="footer">
    墨迹天气 SRM 采购系统 · 结算单未提交发票自动监测 · 数据基于系统导出报表生成
  </div>
</div>

<script>
const ALL_DATA = [];

/* ── 筛选初始化 ── */
function initFilters() {
  const companies = [...new Set(ALL_DATA.map(r => r.company).filter(Boolean))].sort();
  const cSel = document.getElementById('fCompany');
  companies.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; cSel.appendChild(o); });

  // 默认日期范围：2026-01-01 ~ 今天
  document.getElementById('fDateStart').value = '2026-01-01';
  document.getElementById('fDateEnd').value = new Date().toISOString().slice(0, 10);
}

/* 安全提取日期（取前10位 YYYY-MM-DD 用于比较） */
function toDate(s) {
  if (!s) return null;
  var d = s.slice(0, 10); // 2026-04-02 或 2026-04-02 16:22:56 → 统一取前10位
  if (!/^\d{4}-\d{2}-\d{2}$/.test(d)) return null;
  return d;
}

/* 时间筛选辅助：判断日期是否在范围内 */
function dateInRange(rDate, start, end) {
  if (!start && !end) return true;
  var d = toDate(rDate);
  if (!d) return !start || !end; // 无日期时：有筛选条件就过滤掉
  if (start && d < start) return false;
  if (end && d > end) return false;
  return true;
}

function applyFilter() {
  const settleNo = document.getElementById('fSettleNo').value.trim().toLowerCase();
  const orderNo = document.getElementById('fOrderNo').value.trim().toLowerCase();
  const supplier = document.getElementById('fSupplier').value.trim().toLowerCase();
  const company = document.getElementById('fCompany').value;
  const category = document.getElementById('fCategory').value;
  const dateStart = document.getElementById('fDateStart').value;
  const dateEnd = document.getElementById('fDateEnd').value;
  const dateField = document.getElementById('fDateField').value;

  let filtered = ALL_DATA.filter(r => {
    if (settleNo && !r.settleNo.toLowerCase().includes(settleNo)) return false;
    if (orderNo && !r.orderNo.toLowerCase().includes(orderNo)) return false;
    if (supplier && !r.supplier.toLowerCase().includes(supplier)) return false;
    if (company && r.company !== company) return false;
    if (category && r.category !== category) return false;
    if (!dateInRange(r[dateField], dateStart, dateEnd)) return false;
    return true;
  });
  renderTable(filtered);
  document.getElementById('filterSummary').textContent = '筛选结果 ' + filtered.length + ' 条';
}

function resetFilter() {
  document.getElementById('fSettleNo').value = '';
  document.getElementById('fOrderNo').value = '';
  document.getElementById('fSupplier').value = '';
  document.getElementById('fCompany').value = '';
  document.getElementById('fCategory').value = '';
  document.getElementById('fDateStart').value = '2026-01-01';
  document.getElementById('fDateEnd').value = new Date().toISOString().slice(0, 10);
  document.getElementById('fDateField').value = 'settleCreateTime';
  renderTable(ALL_DATA);
  document.getElementById('filterSummary').textContent = '共 ' + ALL_DATA.length + ' 条';
}

function onDateFieldChange() {
  // 切换日期筛选字段时，重置日期范围为 2026-01-01 ~ 今天
  document.getElementById('fDateStart').value = '2026-01-01';
  document.getElementById('fDateEnd').value = new Date().toISOString().slice(0, 10);
}

/* ── CSV 导出 ── */
function exportCSV() {
  const settleNo = document.getElementById('fSettleNo').value.trim().toLowerCase();
  const orderNo = document.getElementById('fOrderNo').value.trim().toLowerCase();
  const supplier = document.getElementById('fSupplier').value.trim().toLowerCase();
  const company = document.getElementById('fCompany').value;
  const category = document.getElementById('fCategory').value;
  const dateStart = document.getElementById('fDateStart').value;
  const dateEnd = document.getElementById('fDateEnd').value;
  const dateField = document.getElementById('fDateField').value;
  let filtered = ALL_DATA.filter(r => {
    if (settleNo && !r.settleNo.toLowerCase().includes(settleNo)) return false;
    if (orderNo && !r.orderNo.toLowerCase().includes(orderNo)) return false;
    if (supplier && !r.supplier.toLowerCase().includes(supplier)) return false;
    if (company && r.company !== company) return false;
    if (category && r.category !== category) return false;
    if (!dateInRange(r[dateField], dateStart, dateEnd)) return false;
    return true;
  });
  const header = '结算单号,订单编号,类型,结算金额,供应商,公司主体,订单创建时间,结算创建时间,采购员,备注';
  const rows = filtered.map(r => [
    r.settleNo, r.orderNo, r.category,
    r.settleAmount, r.supplier, r.company,
    r.createTime, r.settleCreateTime, r.applicant,
    (r.remark || '')
  ].map(v => '"' + String(v).replace(/"/g,'""') + '"').join(','));
  const csv = '\uFEFF' + header + '\n' + rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '未提交发票_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

/* ── Tag ── */
function tagClass(cat) {
  if (cat === '预付') return 'tag-blue';
  return 'tag-red';
}

/* ── 渲染表格 ── */
function renderTable(data) {
  const tbody = document.getElementById('tableBody');
  const noData = document.getElementById('noData');

  if (data.length === 0) {
    tbody.innerHTML = '';
    noData.style.display = 'block';
    return;
  }
  noData.style.display = 'none';

  tbody.innerHTML = data.map(r => {
    const orderDisplay = r.orders && r.orders.length > 1
      ? '<span title="' + r.orders.join(', ') + '">' + r.orders[0] + ' <span style="color:#6b7280;font-size:11px">等' + r.orders.length + '个</span></span>'
      : (r.orderNo || '');
    return '<tr>' +
    '<td><span class="tag ' + tagClass(r.category) + '">' + r.category + '</span></td>' +
    '<td class="col-settle-no">' + r.settleNo + '</td>' +
    '<td>' + orderDisplay + '</td>' +
    '<td>' + r.status + '</td>' +
    '<td class="col-amt">¥' + r.settleAmount.toLocaleString() + '</td>' +
    '<td>' + r.supplier + '</td>' +
    '<td>' + r.company + '</td>' +
    '<td>' + r.createTime + '</td>' +
    '<td>' + (r.settleCreateTime || '—') + '</td>' +
    '<td>' + (r.applicant || '—') + '</td>' +
    '<td class="col-remark">' + (r.remark || '') + '</td>' +
    '</tr>';
  }).join('');
}

/* ── 初始化 ── */
initFilters();
renderTable(ALL_DATA);
</script>
</body>
</html>
